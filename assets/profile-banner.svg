<svg width="1200" height="310" viewBox="0 0 1200 310" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">L7X7 — APIs, Automação e Node.js</title>
  <desc id="desc">Banner tecnológico escuro com linhas ciano e verde.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06111A"/>
      <stop offset="0.52" stop-color="#092735"/>
      <stop offset="1" stop-color="#05202B"/>
    </linearGradient>
    <linearGradient id="line" x1="110" y1="0" x2="1080" y2="310" gradientUnits="userSpaceOnUse">
