  <path d="M0 232H224L266 190H520L562 148H824L872 100H1200" stroke="url(#line)" stroke-width="2"/>
  <path d="M0 260H300L344 216H672L722 166H1015L1060 121H1200" stroke="#00E0A4" stroke-opacity=".24"/>
  <path d="M0 83H162L211 132H467L514 179H735L783 227H1200" stroke="#00B4D8" stroke-opacity=".18"/>

